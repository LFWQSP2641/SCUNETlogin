name: Build APK

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Decode Keystore
      run: |
        echo "${{ secrets.APP_KEYSTORE_BASE64 }}" | base64 -d > android_keystore.jks

    - name: Build APK
      run: |
        cd ${{ github.workspace }}/SCUNETlogin
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew assembleRelease -Pandroid.injected.signing.store.file=${{ github.workspace }}/android_keystore.jks -Pandroid.injected.signing.store.password=${{ secrets.APP_KEYSTORE_PASSWORD }} -Pandroid.injected.signing.key.alias=${{ secrets.APP_KEYSTORE_ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.APP_KEY_PASSWORD }}

    - name: Rename APK files
      run: |
        mkdir -p renamed_apks
        VERSION=${{ github.ref_name }}
        if [[ "$VERSION" == "main" || "$VERSION" == "master" || "$VERSION" == "" ]]; then
          VERSION="v1.0.0"
        fi
        cd SCUNETlogin
        find . -name "*.apk" -type f | while read apk; do
          if [[ $apk == *"arm64-v8a"* ]] && [[ $apk == *"release"* ]]; then
            cp "$apk" "../renamed_apks/SCUNETlogin-arm64-v8a-${VERSION}.apk"
            echo "Renamed: $(basename $apk) -> SCUNETlogin-arm64-v8a-${VERSION}.apk"
          elif [[ $apk == *"x86_64"* ]] && [[ $apk == *"release"* ]]; then
            cp "$apk" "../renamed_apks/SCUNETlogin-x86_64-${VERSION}.apk"
            echo "Renamed: $(basename $apk) -> SCUNETlogin-x86_64-${VERSION}.apk"
          fi
        done
        echo "Renamed APK files:"
        ls -lh ../renamed_apks/ || echo "No APK files found"

    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v7
      if: ${{  success() }}
      with:
        name: arm64-v8a
        path: ${{ github.workspace }}/renamed_apks/SCUNETlogin-arm64-v8a-*.apk

    - name: Upload x86_64 APK
      uses: actions/upload-artifact@v7
      if: ${{  success() }}
      with:
        name: x86_64
        path: ${{ github.workspace }}/renamed_apks/SCUNETlogin-x86_64-*.apk

    - name: Upload to release
      uses: svenstaro/upload-release-action@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        file: ${{ github.workspace }}/renamed_apks/*.apk
        file_glob: true
        prerelease: true
